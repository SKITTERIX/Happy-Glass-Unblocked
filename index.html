<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Happy Glass | Draw Lines</title>
    <style>
      /* Reset margins and hide scrollbars */
      html, body { 
        height: 100%; 
        width: 100%; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        background: #231F20; 
      }

      /* Flexbox centers the game container on the screen */
      #unity-container { 
        width: 100%; 
        height: 100%; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
      }

      /* Responsive Canvas Logic */
      #unity-canvas { 
        width: auto; 
        height: 100%;          /* Forces the game to fit vertically */
        max-width: 100vw;      /* Prevents it from going wider than the screen */
        aspect-ratio: 6 / 9;   /* Maintains your portrait shape */
        object-fit: contain;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" background: #231F20"></canvas>
    </div>

    <script src="Build/game.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");

      createUnityInstance(canvas, {
        dataUrl: "Build/game.data.unityweb",
        frameworkUrl: "Build/game.framework.js.unityweb",
        codeUrl: "Build/game.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "NimmiDevelopers",
        productName: "Happy Glass Draw Lines",
        productVersion: "1.0",
        // Improve performance on mobile high-DPI screens
        devicePixelRatio: Math.min(window.devicePixelRatio, 2), 
      });
    </script>
  </body>
</html>
